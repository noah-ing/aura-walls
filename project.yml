name: VibeWalls
options:
  bundleIdPrefix: com.vibewalls
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "12.0.0"

targets:
  VibeWalls:
    type: application
    platform: iOS
    sources:
      - path: VibeWalls
        excludes:
          - "**/*.xcodeproj"
          - "**/*.storekit"
          - "**/*.template.swift"
    resources:
      - path: VibeWalls/Resources/Subscriptions.storekit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noahingwers.aurawalls
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: VibeWalls/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Aura Walls"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    scheme:
      storeKitConfiguration: VibeWalls/Resources/Subscriptions.storekit
